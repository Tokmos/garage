<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Garageport"/>
  <meta name="theme-color" content="#0f172a"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon.svg"/>
  <title>Garageport</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --surface: #1e293b;
      --green:   #22c55e;
      --green2:  #16a34a;
      --red:     #ef4444;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 24px);
      gap: 16px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
    }
    .app-title { font-size: 18px; font-weight: 700; }
    .app-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

    #settingsBtn {
      background: var(--surface);
      border: none;
      color: var(--muted);
      width: 42px; height: 42px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #settingsBtn:hover { background: #334155; }

    /* ── Single vehicle view ── */
    #singleView {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      flex: 1;
      justify-content: center;
    }

    .reg-badge {
      background: var(--surface);
      border: 1.5px solid #334155;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Round open button (single vehicle) */
    #openBtn {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s;
    }
    #openBtn:active { transform: scale(0.94); }
    #openBtn .btn-icon  { font-size: 56px; line-height: 1; }
    #openBtn .btn-label { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.05em; }
    #openBtn.loading { cursor: not-allowed; background: #15803d; }
    #openBtn.loading .btn-icon, #openBtn.loading .btn-label { display: none; }
    #openBtn.loading .btn-spinner { display: block; }
    #openBtn.success { background: var(--green2); animation: pulse 0.5s ease-out; }
    #openBtn.error   { background: var(--red); }

    /* ── Two vehicle view ── */
    #dualView {
      display: none;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      flex: 1;
      justify-content: center;
    }
    #dualView.visible { display: flex; }

    .vehicle-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border: 1.5px solid #334155;
    }

    .vehicle-reg {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .vehicle-btn {
      width: 100%;
      padding: 18px;
      background: var(--green);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, transform 0.12s;
      letter-spacing: 0.04em;
    }
    .vehicle-btn:active  { transform: scale(0.97); }
    .vehicle-btn.loading { background: #15803d; cursor: not-allowed; }
    .vehicle-btn.loading .vbtn-icon, .vehicle-btn.loading .vbtn-label { display: none; }
    .vehicle-btn.loading .btn-spinner { display: block; }
    .vehicle-btn.success { background: var(--green2); animation: pulse 0.4s ease-out; }
    .vehicle-btn.error   { background: var(--red); }

    /* Spinner */
    .btn-spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    #openBtn .btn-spinner { width: 48px; height: 48px; border-width: 5px; }

    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(34,197,94,0.6); }
      100% { box-shadow: 0 0 0 40px rgba(34,197,94,0); }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: var(--text);
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 15px; font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      border: 1.5px solid #334155;
      z-index: 100;
    }
    #toast.show    { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }

    /* ── Settings overlay / sheet ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }

    .sheet {
      background: #1e293b;
      border-radius: 24px 24px 0 0;
      padding: 24px 24px calc(env(safe-area-inset-bottom,0px) + 24px);
      width: 100%;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .field-label {
      display: block;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .sheet input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 12px;
      color: var(--text);
      font-size: 22px; font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      margin-bottom: 20px;
    }
    .sheet input[type="text"]:focus { border-color: var(--green); }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f172a;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .toggle-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .toggle-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .toggle-switch {
      position: relative;
      width: 48px; height: 28px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #334155;
      border-radius: 28px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .toggle-track::after {
      content: "";
      position: absolute;
      left: 3px; top: 3px;
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--green); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(20px); }

    /* Second vehicle section */
    #vehicle2Section {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.3s ease;
    }
    #vehicle2Section.visible {
      max-height: 200px;
      opacity: 1;
    }

    /* Sheet buttons */
    .sheet-actions { display: flex; gap: 12px; }
    .btn-save, .btn-cancel {
      flex: 1; padding: 14px;
      border-radius: 12px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-save   { background: var(--green); color: #fff; }
    .btn-cancel { background: #334155; color: var(--muted); }

    footer { font-size: 12px; color: #475569; text-align: center; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div>
    <div class="app-title">Garageport</div>
    <div class="app-sub">Hagastaden P-hus</div>
  </div>
  <button id="settingsBtn" onclick="openSettings()" aria-label="Inställningar">⚙️</button>
</header>

<!-- Single vehicle view -->
<div id="singleView">
  <div class="reg-badge" id="regDisplay">ABC123</div>
  <button id="openBtn" onclick="openDoor('openBtn', state.regnr)">
    <span class="btn-icon">🔓</span>
    <span class="btn-label">ÖPPNA</span>
    <div class="btn-spinner"></div>
  </button>
</div>

<!-- Dual vehicle view -->
<div id="dualView">
  <div class="vehicle-card">
    <div class="vehicle-reg" id="regDisplay1">ABC123</div>
    <button class="vehicle-btn" id="openBtn1" onclick="openDoor('openBtn1', state.regnr)">
      <span class="vbtn-icon">🔓</span>
      <span class="vbtn-label">ÖPPNA</span>
      <div class="btn-spinner"></div>
    </button>
  </div>
  <div class="vehicle-card">
    <div class="vehicle-reg" id="regDisplay2">ABC123</div>
    <button class="vehicle-btn" id="openBtn2" onclick="openDoor('openBtn2', state.regnr2)">
      <span class="vbtn-icon">🔓</span>
      <span class="vbtn-label">ÖPPNA</span>
      <div class="btn-spinner"></div>
    </button>
  </div>
</div>

<footer>Tryck för att öppna garaget</footer>

<!-- Toast -->
<div id="toast"></div>

<!-- Settings sheet -->
<div class="overlay" id="overlay" onclick="closeSettings(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h2>Inställningar</h2>

    <label class="field-label" for="regInput1">Fordon 1</label>
    <input type="text" id="regInput1" maxlength="11" autocomplete="off"
           autocorrect="off" spellcheck="false" inputmode="text" placeholder="ABC123"/>

    <!-- Toggle: två fordon -->
    <div class="toggle-row" onclick="toggleVehicle2()">
      <div>
        <div class="toggle-label">Två fordon</div>
        <div class="toggle-sub">Visa knappar för två registreringsnummer</div>
      </div>
      <label class="toggle-switch" onclick="event.stopPropagation()">
        <input type="checkbox" id="twoVehiclesToggle" onchange="toggleVehicle2()"/>
        <div class="toggle-track"></div>
      </label>
    </div>

    <!-- Fordon 2 (dold tills toggle är på) -->
    <div id="vehicle2Section">
      <label class="field-label" for="regInput2">Fordon 2</label>
      <input type="text" id="regInput2" maxlength="11" autocomplete="off"
             autocorrect="off" spellcheck="false" inputmode="text" placeholder="ABC123"/>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSheet()">Avbryt</button>
      <button class="btn-save"   onclick="saveSettings()">Spara</button>
    </div>
  </div>
</div>

<script>
  /* ── State ── */
  const state = {
    regnr:      localStorage.getItem("regnr")       || "ABC123",
    regnr2:     localStorage.getItem("regnr2")      || "ABC123",
    twoVehicles: localStorage.getItem("twoVehicles") === "true",
  };

  function applyState() {
    document.getElementById("regDisplay").textContent  = state.regnr;
    document.getElementById("regDisplay1").textContent = state.regnr;
    document.getElementById("regDisplay2").textContent = state.regnr2;

    const single = document.getElementById("singleView");
    const dual   = document.getElementById("dualView");
    if (state.twoVehicles) {
      single.style.display = "none";
      dual.classList.add("visible");
    } else {
      single.style.display = "";
      dual.classList.remove("visible");
    }
  }

  applyState();

  /* ── Open door ── */
  async function openDoor(btnId, regnr) {
    const btn = document.getElementById(btnId);
    if (btn.classList.contains("loading")) return;
    btn.classList.add("loading");

    try {
      const res  = await fetch("/api/open", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ regnr }),
      });
      const data = await res.json();
      btn.classList.remove("loading");
      if (data.ok) {
        btn.classList.add("success");
        showToast("✅ " + data.msg, "success");
      } else {
        btn.classList.add("error");
        showToast("❌ " + data.msg, "error");
      }
    } catch {
      btn.classList.remove("loading");
      btn.classList.add("error");
      showToast("❌ Ingen kontakt med servern", "error");
    }

    setTimeout(() => btn.classList.remove("success", "error"), 2500);
  }

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "show " + (type || "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ""; }, 3000);
  }

  /* ── Settings ── */
  function openSettings() {
    document.getElementById("regInput1").value = state.regnr;
    document.getElementById("regInput2").value = state.regnr2;
    document.getElementById("twoVehiclesToggle").checked = state.twoVehicles;
    document.getElementById("vehicle2Section").classList.toggle("visible", state.twoVehicles);
    document.getElementById("overlay").classList.add("open");
    setTimeout(() => document.getElementById("regInput1").focus(), 300);
  }

  function closeSheet() {
    document.getElementById("overlay").classList.remove("open");
  }

  function closeSettings(e) {
    if (e.target === document.getElementById("overlay")) closeSheet();
  }

  function toggleVehicle2() {
    const cb  = document.getElementById("twoVehiclesToggle");
    const sec = document.getElementById("vehicle2Section");
    // Om klick kom från toggle-row (inte checkboxen själv) – flippa checkbox
    if (document.activeElement !== cb) cb.checked = !cb.checked;
    sec.classList.toggle("visible", cb.checked);
  }

  function saveSettings() {
    const v1 = document.getElementById("regInput1").value.toUpperCase().replace(/\s/g,"");
    const v2 = document.getElementById("regInput2").value.toUpperCase().replace(/\s/g,"");
    const two = document.getElementById("twoVehiclesToggle").checked;

    if (!v1) { document.getElementById("regInput1").focus(); return; }
    if (two && !v2) { document.getElementById("regInput2").focus(); return; }

    state.regnr       = v1;
    state.regnr2      = v2 || state.regnr2;
    state.twoVehicles = two;

    localStorage.setItem("regnr",       state.regnr);
    localStorage.setItem("regnr2",      state.regnr2);
    localStorage.setItem("twoVehicles", state.twoVehicles);

    applyState();
    closeSheet();
    showToast("💾 Sparat!", "success");
  }

  /* Uppercase inputs */
  ["regInput1","regInput2"].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener("input",   function() { this.value = this.value.toUpperCase().replace(/\s/g,""); });
    el.addEventListener("keydown", e => { if (e.key === "Enter") saveSettings(); });
  });

  /* ── PWA – avregistrera gammal service worker så cachning inte blockerar uppdateringar ── */
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
  }
</script>
</body>
</html>
